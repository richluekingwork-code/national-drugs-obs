[phases]
setup = { nixPkgs = ["python3", "postgresql_16.dev", "gcc"] }
install = { cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
    "python manage.py collectstatic --noinput",
] }

[start]
cmd = "python manage.py migrate --noinput && gunicorn national_drug_obs.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120 --access-logfile - --error-logfile -"

[variables]
DJANGO_SETTINGS_MODULE = "national_drug_obs.settings"
PYTHONUNBUFFERED = "1"
