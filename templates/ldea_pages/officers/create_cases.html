{% extends 'base.html' %}
{% load static %}
{% block content %}
    <title>{% block title %}LDEA Officers Create Cases Page{% endblock %}</title>
    <style>
        /* CARD */
        .drug-form .card {
            border-radius: 10px;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* LABEL */
        .form-label {
            font-weight: 500;
            color: #344054;
        }

        /* INPUT */
        .form-control, .form-select {
            border-radius: 6px;
            border: 1px solid #d0d5dd;
            padding: 10px;
            transition: all 0.2s ease;
        }

        /* FOCUS EFFECT */
        .form-control:focus, .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.1rem rgba(13,110,253,0.15);
        }

        /* PARTICIPANT BOX */
        .participant-row {
            background: #f9fafb;
            border: 1px solid #e4e7ec;
        }

        /* BUTTON */
        .btn-primary {
            border-radius: 6px;
            font-weight: 500;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <div class="mt-4">
        <div class="row g-4">

            <div class="col-12 col-xl-12 order-1 order-xl-0">
                <div class="mb-9">
                    <div class="card shadow-none border my-4" data-component-card="data-component-card">
                        {% include 'includes/error.html' %}
                        
                        <div class="card-body p-0">
                            <div class="p-4 code-to-copy">
                                <div id="tableExample" data-list='{"valueNames":["name","email","age"],"page":5,"pagination":true}'>
                                    
                                    <form method="POST" class="drug-form">
                                        {% csrf_token %}

                                        <div class="card shadow-sm border-0">

                                            <!-- HEADER -->
                                            <div class="card-header bg-white border-bottom">
                                                <h5 class="mb-0 fw-semibold">Case Registration</h5>
                                            </div>

                                            <div class="card-body">
                                                <div class="row g-4">

                                                    <!-- ===================== -->
                                                    <!-- CASE INFORMATION -->
                                                    <!-- ===================== -->

                                                    <div class="col-md-4">
                                                        <label>Case Number <span class="text-danger">*</span></label>
                                                        <input type="text" name="case_number" class="form-control" required>
                                                    </div>

                                                    <div class="col-md-4">
                                                        <label>Case Title <span class="text-danger">*</span></label>
                                                        <input type="text" name="title" class="form-control" required>
                                                    </div>                

                                                    <div class="col-md-4">
                                                        <label>Police Station <span class="text-danger">*</span></label>
                                                        <input type="text" name="court_name" class="form-control" required>
                                                    </div>

                                                    <div class="col-md-4">
                                                        <label>County <span class="text-danger">*</span></label>
                                                        <select name="county" class="form-control" required>
                                                            <option value="">Select County</option>
                                                            <option>Bomi County</option>
                                                            <option>Bong County</option>
                                                            <option>Gbarpolu County</option>
                                                            <option>Grand Bassa County</option>
                                                            <option>Grand Cape Mount County</option>
                                                            
                                                            <option>Grand Gedeh County</option>
                                                            <option>Grand Kru County</option>
                                                            <option>Lofa County</option>
                                                            <option>Margibi County</option>
                                                            <option>Maryland County</option>

                                                            <option>Montserrado County</option>
                                                            <option>Nimba County</option>
                                                            <option>Rivercess County</option>
                                                            <option>River Gee County</option>
                                                            <option>Sinoe County</option>
                                                        </select>
                                                    </div>

                                                    <div class="col-md-4">
                                                        <label>Charge <span class="text-danger">*</span></label>
                                                        <input type="text" name="charge" class="form-control" required>
                                                    </div>

                                                    <div class="col-md-4">
                                                        <label>Status <span class="text-danger">*</span></label>
                                                        <select name="status" class="form-select" required>
                                                            <option value="pending">Case pending at MOJ</option>
                                                            <option value="investigation">Under Investigation</option>
                                                            <option value="closed">Closed</option>
                                                        </select>
                                                    </div>

                                                    <div class="col-md-4">
                                                        <label>Evidence <span class="text-danger">*</span></label>
                                                        <input type="text" name="substance" class="form-control" required>
                                                    </div>

                                                    <div class="col-md-4">
                                                        <label>Action Taken <span class="text-danger">*</span></label>
                                                        <input type="text" name="action_taken" class="form-control" required>
                                                    </div>

                                                    <div class="col-12">
                                                        <label>Statement of  <span class="text-danger">*</span></label>
                                                        <textarea name="description" class="form-control" required></textarea>
                                                    </div>

                                                    <!-- ===================== -->
                                                    <!-- SUSPECTS -->
                                                    <!-- ===================== -->

                                                    <div class="col-12">
                                                        <hr>
                                                        <h6 class="fw-semibold text-danger">Suspects</h6>
                                                    </div>

                                                    <div id="suspects-container" class="col-12">

                                                        <div class="participant-row border p-3 mb-3 bg-light">
                                                            <div class="row g-3">

                                                                <div class="col-md-8">
                                                                    <label>Select Suspect</label>

                                                                    <select name="suspect_ids[]" class="form-select select2" multiple>

                                                                        <option disabled>Select Suspect</option>

                                                                        {% for p in persons %}
                                                                            {% if p.role == "suspect" %}

                                                                            <option
                                                                                value="{{ p.id }}"
                                                                                data-image="{% if p.photo %}{{ p.photo.url }}{% endif %}">

                                                                                {{ p.first_name }}
                                                                                {{ p.middle_name }}
                                                                                {{ p.last_name }}
                                                                                - (Nick Name {{ p.other_name }})

                                                                            </option>

                                                                            {% endif %}
                                                                        {% endfor %}

                                                                    </select>
                                                                </div>

                                                                <div class="col-md-4 d-flex align-items-end">
                                                                    <div class="form-check">
                                                                        <input type="radio" name="primary_suspect" value="0" class="form-check-input">
                                                                        <label>Primary Suspect</label>
                                                                    </div>
                                                                </div>

                                                            </div>
                                                        </div>

                                                    </div>


                                                    <!-- ===================== -->
                                                    <!-- SUBMIT -->
                                                    <!-- ===================== -->

                                                    <div class="col-12 text-end mt-3">
                                                        <button type="submit" class="btn btn-primary px-4">
                                                            Save Case
                                                        </button>
                                                    </div>

                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
           
        </div>
    </div>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        function formatState(state) {

            // First option / placeholder
            if (!state.id || !state.element) {
                return state.text;
            }

            var image = $(state.element).data('image');

            // If no image exists, show only text
            if (!image){
                return state.text;
            }

            return $(`
                <div style="display:flex;align-items:center;gap:10px;">
                    <img src="${image}"
                        style="
                            width:35px;
                            height:35px;
                            border-radius:50%;
                            object-fit:cover;
                        ">

                    <span>${state.text}</span>
                </div>
            `);
        }

        $('.select2').select2({
            placeholder:'Select Arrest',
            templateResult: formatState,
            templateSelection: formatState
        });
    </script>

    <script>
        let suspectIndex = 1;
        let victimIndex = 1;

        // ==============================
        // UPDATE DROPDOWNS (NO DUPLICATES)
        // ==============================
        function updateDropdowns(type) {
            let selects = document.querySelectorAll(`select[name="${type}_ids[]"]`);
            let selectedValues = [];

            // Collect selected values
            selects.forEach(select => {
                if (select.value) {
                    selectedValues.push(select.value);
                }
            });

            // Disable duplicates
            selects.forEach(select => {
                let currentValue = select.value;

                Array.from(select.options).forEach(option => {
                    if (!option.value) return;

                    if (selectedValues.includes(option.value) && option.value !== currentValue) {
                        option.disabled = true;
                    } else {
                        option.disabled = false;
                    }
                });
            });
        }

        // ==============================
        // ADD SUSPECT
        // ==============================
        function addSuspect() {
            let container = document.getElementById("suspects-container");

            let row = `
            <div class="participant-row border p-3 mb-3 bg-light">
                <div class="row g-3">

                    <div class="col-md-8">
                        <select name="suspect_ids[]" class="form-select" required onchange="updateDropdowns('suspect')">
                            <option disabled selected>Select Suspect</option>
                            {% for p in persons %}
                                {% if p.role == "suspect" %}
                                <option value="{{ p.id }}">{{ p.first_name }} {{ p.last_name }}</option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <input type="radio" name="primary_suspect" value="${suspectIndex}">
                    </div>

                </div>
            </div>
            `;

            container.insertAdjacentHTML("beforeend", row);
            suspectIndex++;

            updateDropdowns('suspect');
        }

        // ==============================
        // ADD VICTIM
        // ==============================
        function addVictim() {
            let container = document.getElementById("victims-container");

            let row = `
            <div class="participant-row border p-3 mb-3 bg-light">
                <div class="row g-3">

                    <div class="col-md-8">
                        <select name="victim_ids[]" class="form-select" required onchange="updateDropdowns('victim')">
                            <option disabled selected>Select Victim</option>
                            {% for p in persons %}
                                {% if p.role == "victim" %}
                                <option value="{{ p.id }}">{{ p.first_name }} {{ p.last_name }}</option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <input type="radio" name="primary_victim" value="${victimIndex}">
                    </div>

                </div>
            </div>
            `;

            container.insertAdjacentHTML("beforeend", row);
            victimIndex++;

            updateDropdowns('victim');
        }

        // ==============================
        // INITIAL LOAD
        // ==============================
        document.addEventListener("DOMContentLoaded", function () {

            // Attach onchange to existing selects
            document.querySelectorAll('select[name="suspect_ids[]"]').forEach(el => {
                el.addEventListener("change", () => updateDropdowns('suspect'));
            });

            document.querySelectorAll('select[name="victim_ids[]"]').forEach(el => {
                el.addEventListener("change", () => updateDropdowns('victim'));
            });

            // Initial run
            updateDropdowns('suspect');
            updateDropdowns('victim');
        });
    </script>
{% endblock content %}
