<!DOCTYPE html>
{% load static %}
<html lang="en-US" dir="ltr" data-navigation-type="default" data-navbar-horizontal-shape="default">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ===============================================-->
    <!--    Document Title-->
    <!-- ===============================================-->
    <title>LogIn</title>

    <!-- ===============================================-->
    <!--    Favicons-->
    <!-- ===============================================-->
  
    <link rel="shortcut icon" type="image/x-icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSygpr0dumOnK7amn0Dtj8KWyNjCRxHLve39g&s">
    <link rel="manifest" href="{% static 'assets/img/favicons/manifest.json' %}">
    
    <link rel="stylesheet" href="{% static 'assets/unicons.iconscout.com/release/v4.0.8/css/line.css' %}">
    <meta name="msapplication-TileImage" content="{% static 'assets/img/favicons/mstile-150x150.png' %}">
    <meta name="theme-color" content="#ffffff">
    
    <script src="{% static 'assets/vendors/simplebar/simplebar.min.js' %}"></script>
    <script src="{% static 'assets/js/config.js' %}"></script>

    <!-- ===============================================-->
    <!--    Stylesheets-->
    <!-- ===============================================-->
    <link href="{% static 'assets/vendors/choices/choices.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendors/dhtmlx-gantt/dhtmlxgantt.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendors/flatpickr/flatpickr.min.css' %}" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800;900&amp;display=swap" rel="stylesheet">
    
    <link href="{% static 'assets/vendors/simplebar/simplebar.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/unicons.iconscout.com/release/v4.0.8/css/line.css' %}">
    
    <link href="{% static 'assets/css/theme-rtl.min.css' %}" type="text/css" rel="stylesheet" id="style-rtl">
    <link href="{% static 'assets/css/theme.min.css' %}" type="text/css" rel="stylesheet" id="style-default">
    <link href="{% static 'assets/css/user-rtl.min.css' %}" type="text/css" rel="stylesheet" id="user-style-rtl">
    <link href="{% static 'assets/css/user.min.css' %}" type="text/css" rel="stylesheet" id="user-style-default">
    
    <script>
      var phoenixIsRTL = window.config.config.phoenixIsRTL;
      if (phoenixIsRTL) {
        var linkDefault = document.getElementById('style-default');
        var userLinkDefault = document.getElementById('user-style-default');
        linkDefault.setAttribute('disabled', true);
        userLinkDefault.setAttribute('disabled', true);
        document.querySelector('html').setAttribute('dir', 'rtl');
      } else {
        var linkRTL = document.getElementById('style-rtl');
        var userLinkRTL = document.getElementById('user-style-rtl');
        linkRTL.setAttribute('disabled', true);
        userLinkRTL.setAttribute('disabled', true);
      }
    </script>
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
</head>

  <body>
    <!-- ===============================================-->
    <!--    Main Content-->
    <!-- ===============================================-->
    <main class="main" id="top">
        <div class="container">
            <div class="row flex-center min-vh-100 py-5">
                <div class="col-sm-10 col-md-8 col-lg-5 col-xl-5 col-xxl-3">
                    <a class="d-flex flex-center text-decoration-none mb-4" href="../../../index.html">
                        <div class="d-flex align-items-center fw-bolder fs-3 d-inline-block">
                            <img src="{% static 'assets/img/logo/logo1.png' %}" alt="phoenix" width="200" />
                        </div>
                    </a>
                    {% include 'includes/error.html' %}
                    <div class="position-relative">
                        <hr class="bg-body-secondary mt-5 mb-4" />
                        <div class="divider-content-center">LogIn using your email</div>
                    </div>
                    <form action="{% url 'dologin' %}" method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3 text-start">
                            <label class="form-label" for="email">Email address</label>
                            <div class="form-icon-container">
                                <input name="email" class="form-control form-icon-input" id="email" type="email" placeholder="name@example.com" required/>
                                <span class="fas fa-user text-body fs-9 form-icon"></span>
                            </div>
                        </div>

                        <div class="mb-3 text-start">
                            <label class="form-label" for="password">Password</label>
                            <div class="form-icon-container" data-password="data-password">
                                <input name="password" class="form-control form-icon-input pe-6" id="password" type="password" placeholder="Password" data-password-input="data-password-input" required/>
                                <span class="fas fa-key text-body fs-9 form-icon"></span>
                                <button class="btn px-3 py-0 h-100 position-absolute top-0 end-0 fs-7 text-body-tertiary" data-password-toggle="data-password-toggle">
                                    <span class="uil uil-eye show"></span>
                                    <span class="uil uil-eye-slash hide"></span>
                                </button>
                            </div>
                        </div>

                        <div class="row flex-between-center mb-7">
                            <div class="col-auto">
                                <div class="form-check mb-0">
                                    <input class="form-check-input" id="basic-checkbox" type="checkbox" checked="checked" />
                                    <label class="form-check-label mb-0" for="basic-checkbox">Remember me</label>
                                </div>
                            </div>
                    
                            <div class="col-auto">
                                <a class="fs-9 fw-semibold" href="">
                                    Forgot Password?
                                </a>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100 mb-3">Sign In</button>
                    </form>
                     {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show mt-0" role="alert">
                        <span style="color: red;">{{ message }}</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endfor %}
                    {% endif %}
                </div>
            </div>
        </div>

    </main><!-- ===============================================-->
    <!--    End of Main Content-->
    <!-- ===============================================-->


    <!-- ===============================================-->
    <!--    JavaScripts-->
    <!-- ===============================================-->
    <script src="{% static 'assets/vendors/popper/popper.min.js' %}"></script>
    <script src="{% static 'assets/vendors/bootstrap/bootstrap.min.js' %}"></script>
    <script src="{% static 'assets/vendors/anchorjs/anchor.min.js' %}"></script>
    <script src="{% static 'assets/vendors/is/is.min.js' %}"></script>
    <script src="{% static 'assets/vendors/fontawesome/all.min.js' %}"></script>
    <script src="{% static 'assets/vendors/lodash/lodash.min.js' %}"></script>
    <script src="{% static 'assets/vendors/list.js/list.min.js' %}"></script>
    <script src="{% static 'assets/vendors/feather-icons/feather.min.js' %}"></script>
    <script src="{% static 'assets/vendors/dayjs/dayjs.min.js' %}"></script>
    <script src="{% static 'assets/js/phoenix.js' %}"></script>
  </body>

</html>
