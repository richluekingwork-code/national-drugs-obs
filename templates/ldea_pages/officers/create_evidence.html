{% extends 'base.html' %}
{% load static %}
{% block content %}
    <title>{% block title %}LDEA Officers Create Evidence Page{% endblock %}</title>
    
    <style>

        /* LABELS */
        .form-label{
            font-weight:600;
            color:#374151;
            margin-bottom:8px;
        }

        /* INPUTS + NORMAL SELECTS + TEXTAREA */
        .form-control,
        .form-select,
        textarea{

            height:56px;
            border-radius:14px !important;
            border:1px solid #d1d5db !important;

            background:#fff;
            padding:12px 18px;

            font-size:15px;
            font-weight:500;

            transition:.25s ease;
            box-shadow:0 3px 10px rgba(0,0,0,.04);
        }

        /* TEXTAREA */
        textarea.form-control{
            min-height:120px;
            padding-top:15px;
        }

        /* FOCUS EFFECT */

        .form-control:focus,
        .form-select:focus,
        textarea:focus{

            border-color:#0d6efd !important;

            box-shadow:
                0 0 0 4px rgba(13,110,253,.12),
                0 8px 18px rgba(13,110,253,.08) !important;

            outline:none;
        }

        /* PLACEHOLDER */

        .form-control::placeholder,
        textarea::placeholder{
            color:#9ca3af;
        }

        /* CARD LOOK */

        .card{
            border-radius:22px;
            overflow:hidden;
        }

        .card-header{
            padding:20px 24px;
        }

        .card-body{
            padding:30px;
        }

        /* BUTTON */

        .btn-primary{

            border-radius:14px;
            padding:14px 30px;

            font-weight:600;

            box-shadow:
                0 8px 20px rgba(13,110,253,.20);

            transition:.25s ease;
        }

        .btn-primary:hover{

            transform:translateY(-2px);

            box-shadow:
                0 12px 28px rgba(13,110,253,.28);
        }


        /* SELECT2 MATCHING STYLE */

        .select2-container{
            width:100%!important;
        }

        .select2-selection--single{

            height:56px !important;

            border-radius:14px !important;

            border:1px solid #d1d5db !important;

            display:flex !important;

            align-items:center !important;

            padding:0 12px !important;

            box-shadow:0 3px 10px rgba(0,0,0,.04);
        }

        .select2-container--focus .select2-selection{

            border-color:#0d6efd !important;

            box-shadow:
                0 0 0 4px rgba(13,110,253,.12),
                0 8px 18px rgba(13,110,253,.08) !important;
        }

        .select2-dropdown{

            border:none;

            border-radius:16px;

            overflow:hidden;

            box-shadow:0 12px 35px rgba(0,0,0,.12);
        }

        .select2-results__option{
            padding:12px 15px;
        }

    </style>

    <div class="mt-4">
        <div class="row g-4">

            <div class="col-12 col-xl-12 order-1 order-xl-0">
                <div class="mb-9">
                    <div class="card shadow-none border my-4" data-component-card="data-component-card">
                        {% include 'includes/error.html' %}
                        
                        <div class="card-body p-0">
                            <div class="p-4 code-to-copy">
                                <div id="tableExample" data-list='{"valueNames":["name","email","age"],"page":5,"pagination":true}'>
                                   
                                    <form action="{% url 'create_evidence' %}" method="POST" enctype="multipart/form-data">
                                        {% csrf_token %}
                                        <div class="card shadow-sm border-0">
                                            <div class="card-header bg-white border-bottom">
                                                <h5 class="mb-0 fw-semibold">Add Evidence</h5>
                                            </div>

                                            <div class="card-body">
                                                <div class="row g-4">
                                                    
                                                    <div class="col-md-6">
                                                        <label class="form-label">Related Arrest</label>
                                                        <select name="arrest" class="form-select select2">
                                                            <option disabled selected>Select Arrest</option>

                                                            {% for a in arrests %}
                                                            <option
                                                                value="{{ a.id }}"
                                                                data-image="{{ a.person.photo.url }}">
                                                                {{a.person.first_name}} {{a.person.middle_name}} {{a.person.last_name}} - Nike Name {{a.person.other_name}} 
                                                            </option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>

                                                    <!-- Case -->
                                                    <div class="col-md-6">
                                                        <label class="form-label">Case</label>
                                                        <select name="case" class="form-select">
                                                            <option disabled selected>Select Case</option>
                                                            {% for c in cases %}
                                                            <option value="{{ c.id }}">{{c.title}} {{c.case_number}}</option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>

                                                    <!-- Evidence Name -->
                                                    <div class="col-md-6">
                                                        <label class="form-label">Evidence Name *</label>
                                                        <input name="name" type="text" class="form-control" required>
                                                    </div>

                                                    <!-- Evidence Type -->
                                                    <div class="col-md-3">
                                                        <label class="form-label">Evidence Type *</label>
                                                        <select name="evidence_type" class="form-select" required>
                                                            <option disabled selected>Select Type</option>
                                                            <option value="drug">Drug / Narcotic</option>
                                                            <option value="weapon">Weapon</option>
                                                            <option value="document">Document</option>
                                                            <option value="electronics">Electronics</option>
                                                            <option value="other">Other</option>
                                                        </select>
                                                    </div>

                                                    <!-- Status -->
                                                    <div class="col-md-3">
                                                        <label class="form-label">Status</label>
                                                        <select name="status" class="form-select">
                                                            <option value="stored">Stored</option>
                                                            <option value="analyzed">Analyzed</option>
                                                            <option value="destroyed">Destroyed</option>
                                                            <option value="submitted_to_court">Submitted to Court</option>
                                                        </select>
                                                    </div>

                                                    <!-- Quantity -->
                                                    <div class="col-md-3">
                                                        <label class="form-label">Quantity</label>
                                                        <input name="quantity" type="number" step="any" class="form-control">
                                                    </div>

                                                    <!-- Unit -->
                                                    <div class="col-md-3">
                                                        <label class="form-label">Unit</label>
                                                        <input name="unit" type="text" class="form-control">
                                                    </div>

                                                    <!-- Drug Type -->
                                                    <div class="col-md-6">
                                                        <label class="form-label">Drug Type</label>
                                                        <select name="drug_type" class="form-select">
                                                            <option disabled selected>Select Drug</option>
                                                            {% for d in drug_types %}
                                                            <option value="{{ d.id }}">{{ d.name }}</option>
                                                            {% endfor %}
                                                        </select>
                                                    </div>
                                                    
                                                    <!-- Location -->
                                                    <div class="col-md-3">
                                                        <label class="form-label">County</label>
                                                        <select name="county" class="form-control" required>
                                                            <option value="">Select County</option>
                                                            <option>Bomi County</option>
                                                            <option>Bong County</option>
                                                            <option>Gbarpolu County</option>
                                                            <option>Grand Bassa County</option>
                                                            <option>Grand Cape Mount County</option>
                                                            
                                                            <option>Grand Gedeh County</option>
                                                            <option>Grand Kru County</option>
                                                            <option>Lofa County</option>
                                                            <option>Margibi County</option>
                                                            <option>Maryland County</option>

                                                            <option>Montserrado County</option>
                                                            <option>Nimba County</option>
                                                            <option>Rivercess County</option>
                                                            <option>River Gee County</option>
                                                            <option>Sinoe County</option>

                                                        </select>
                                                    </div>

                                                    <div class="col-md-3">
                                                        <label class="form-label">District</label>
                                                        <select name="district" class="form-control" required>
                                                            <option value="">Select County</option>
                                                            <option>District - 1</option>
                                                            <option>District - 2</option>
                                                            <option>District - 3</option>
                                                            <option>District - 4</option>
                                                            <option>District - 5</option>
                                                            
                                                            <option>District - 6</option>
                                                            <option>District - 7</option>
                                                            <option>District - 8</option>
                                                            <option>District - 9</option>
                                                            <option>District - 10</option>

                                                            <option>District - 11</option>
                                                            <option>District - 12</option>
                                                            <option>District - 13</option>
                                                            <option>District - 14</option>
                                                            <option>District - 15</option>

                                                            <option>District - 16</option>
                                                            <option>District - 17</option>
                                                            <option>District - 18</option>
                                                            <option>District - 19</option>
                                                            <option>District - 20</option>

                                                        </select>
                                                    </div>

                                                    <div class="col-md-6">
                                                        <label class="form-label">Location Description</label>
                                                        <input name="location_description" type="text" class="form-control">
                                                    </div>

                                                    <!-- Officer -->
                                                    <div class="col-md-6">
                                                        <label class="form-label">Collected By</label>
                                                        <input name="collected_by" type="text" class="form-control">
                                                    </div>

                                                    <div class="col-md-6">
                                                        <label class="form-label">Badge Number</label>
                                                        <input name="badge_number" type="text" class="form-control">
                                                    </div>

                                                    <!-- Remarks -->
                                                    <div class="col-12">
                                                        <label class="form-label">Remarks</label>
                                                        <textarea name="remarks" class="form-control" rows="4"></textarea>
                                                    </div>

                                                    <!-- Submit -->
                                                    <div class="col-12 text-end">
                                                        <button class="btn btn-primary px-4">Save Evidence</button>
                                                    </div>

                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                   
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
           
        </div>
    </div>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        function formatState(state) {

            // First option / placeholder
            if (!state.id || !state.element) {
                return state.text;
            }

            var image = $(state.element).data('image');

            // If no image exists, show only text
            if (!image){
                return state.text;
            }

            return $(`
                <div style="display:flex;align-items:center;gap:10px;">
                    <img src="${image}"
                        style="
                            width:35px;
                            height:35px;
                            border-radius:50%;
                            object-fit:cover;
                        ">

                    <span>${state.text}</span>
                </div>
            `);
        }

        $('.select2').select2({
            placeholder:'Select Arrest',
            templateResult: formatState,
            templateSelection: formatState
        });
    </script>

    <script>
        document.querySelector(".drug-form").addEventListener("submit", function() {
            const btn = this.querySelector("button");
            btn.disabled = true;
            btn.innerText = "Saving...";
        });
    </script>   
{% endblock content %}
