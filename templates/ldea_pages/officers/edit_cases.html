{% extends 'base.html' %}
{% load static %}
{% block content %}
    <title>{% block title %}LDEA Officers Edit Cases Page{% endblock %}</title>
    <style>
        /* CARD */
        .drug-form .card {
            border-radius: 10px;
            animation: fadeIn 0.3s ease-in-out;
        }

        /* LABEL */
        .form-label {
            font-weight: 500;
            color: #344054;
        }

        /* INPUT */
        .form-control, .form-select {
            border-radius: 6px;
            border: 1px solid #d0d5dd;
            padding: 10px;
            transition: all 0.2s ease;
        }

        /* FOCUS EFFECT */
        .form-control:focus, .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.1rem rgba(13,110,253,0.15);
        }

        /* PARTICIPANT BOX */
        .participant-row {
            background: #f9fafb;
            border: 1px solid #e4e7ec;
        }

        /* BUTTON */
        .btn-primary {
            border-radius: 6px;
            font-weight: 500;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <div class="mt-4">
        <div class="row g-4">

            <div class="col-12 col-xl-12 order-1 order-xl-0">
                <div class="mb-9">
                    <div class="card shadow-none border my-4" data-component-card="data-component-card">
                        {% include 'includes/error.html' %}
                        
                        <div class="card-body p-0">
                            <div class="p-4 code-to-copy">
                                <div id="tableExample" data-list='{"valueNames":["name","email","age"],"page":5,"pagination":true}'>
                                    
                                    <form method="POST" class="drug-form">
    {% csrf_token %}

    <div class="card shadow-sm border-0">

        <!-- HEADER -->
        <div class="card-header bg-white border-bottom">
            <h5 class="mb-0 fw-semibold">Edit Case</h5>
        </div>

        <div class="card-body">
            <div class="row g-4">

                <!-- CASE NUMBER -->
                <div class="col-md-4">
                    <label>Case Number <span class="text-danger">*</span></label>
                    <input type="text" name="case_number" class="form-control"
                           value="{{ case.case_number }}" required>
                </div>

                <!-- TITLE -->
                <div class="col-md-4">
                    <label>Case Title <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control"
                           value="{{ case.title }}" required>
                </div>

                <!-- COURT / STATION -->
                <div class="col-md-4">
                    <label>Police Station <span class="text-danger">*</span></label>
                    <input type="text" name="court_name" class="form-control"
                           value="{{ case.court_name }}" required>
                </div>

                <!-- COUNTY -->
                <div class="col-md-4">
                    <label>County <span class="text-danger">*</span></label>
                    <select name="county" class="form-control" required>

                        <option value="Bomi County" {% if case.county == "Bomi County" %}selected{% endif %}>Bomi County</option>
                        <option value="Bong County" {% if case.county == "Bong County" %}selected{% endif %}>Bong County</option>
                        <option value="Gbarpolu County" {% if case.county == "Gbarpolu County" %}selected{% endif %}>Gbarpolu County</option>
                        <option value="Grand Bassa County" {% if case.county == "Grand Bassa County" %}selected{% endif %}>Grand Bassa County</option>
                        <option value="Grand Cape Mount County" {% if case.county == "Grand Cape Mount County" %}selected{% endif %}>Grand Cape Mount County</option>
                        <option value="Grand Gedeh County" {% if case.county == "Grand Gedeh County" %}selected{% endif %}>Grand Gedeh County</option>
                        <option value="Grand Kru County" {% if case.county == "Grand Kru County" %}selected{% endif %}>Grand Kru County</option>
                        <option value="Lofa County" {% if case.county == "Lofa County" %}selected{% endif %}>Lofa County</option>
                        <option value="Margibi County" {% if case.county == "Margibi County" %}selected{% endif %}>Margibi County</option>
                        <option value="Maryland County" {% if case.county == "Maryland County" %}selected{% endif %}>Maryland County</option>
                        <option value="Montserrado County" {% if case.county == "Montserrado County" %}selected{% endif %}>Montserrado County</option>
                        <option value="Nimba County" {% if case.county == "Nimba County" %}selected{% endif %}>Nimba County</option>
                        <option value="Rivercess County" {% if case.county == "Rivercess County" %}selected{% endif %}>Rivercess County</option>
                        <option value="River Gee County" {% if case.county == "River Gee County" %}selected{% endif %}>River Gee County</option>
                        <option value="Sinoe County" {% if case.county == "Sinoe County" %}selected{% endif %}>Sinoe County</option>

                    </select>
                </div>

                <!-- CHARGE -->
                <div class="col-md-4">
                    <label>Charge <span class="text-danger">*</span></label>
                    <input type="text" name="charge" class="form-control"
                           value="{{ case.charge }}" required>
                </div>

                <!-- STATUS -->
                <div class="col-md-4">
                    <label>Status <span class="text-danger">*</span></label>

                    <select name="status" class="form-select" required>

                        <option value="pending" {% if case.status == "pending" %}selected{% endif %}>
                            Case pending at MOJ
                        </option>

                        <option value="investigation" {% if case.status == "investigation" %}selected{% endif %}>
                            Under Investigation
                        </option>

                        <option value="closed" {% if case.status == "closed" %}selected{% endif %}>
                            Closed
                        </option>

                    </select>
                </div>

                <!-- EVIDENCE -->
                <div class="col-md-4">
                    <label>Evidence <span class="text-danger">*</span></label>
                    <input type="text" name="substance" class="form-control"
                           value="{{ case.substance }}" required>
                </div>

                <!-- ACTION TAKEN -->
                <div class="col-md-4">
                    <label>Action Taken <span class="text-danger">*</span></label>
                    <input type="text" name="action_taken" class="form-control"
                           value="{{ case.action_taken }}" required>
                </div>

                <!-- DESCRIPTION -->
                <div class="col-12">
                    <label>Statement of <span class="text-danger">*</span></label>
                    <textarea name="description" class="form-control" required>{{ case.description }}</textarea>
                </div>

                <!-- ===================== -->
                <!-- SUSPECTS -->
                <!-- ===================== -->

                <div class="col-12">
                    <hr>
                    <h6 class="fw-semibold text-danger">Suspects</h6>
                </div>

                <div class="col-12">

                    <select name="suspect_ids[]" class="form-select select2" multiple>

                        {% for p in persons %}

                            <option value="{{ p.id }}"
                                data-image="{% if p.photo %}{{ p.photo.url }}{% endif %}"

                                {% if p.id in selected_suspects %}
                                    selected
                                {% endif %}>

                                {{ p.first_name }}
                                {{ p.middle_name }}
                                {{ p.last_name }}
                                - (Nick Name {{ p.other_name }})

                            </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- PRIMARY SUSPECT -->
                <div class="col-12 mt-3">

                    <label class="fw-semibold">Primary Suspect</label>

                    <select name="primary_suspect" class="form-select">

                        {% for p in persons %}
                            {% if p.id in selected_suspects %}
                                <option value="{{ forloop.counter0 }}">
                                    {{ p.first_name }} {{ p.last_name }}
                                </option>
                            {% endif %}
                        {% endfor %}

                    </select>

                </div>

                <!-- SUBMIT -->
                <div class="col-12 text-end mt-4">
                    <button type="submit" class="btn btn-primary px-4">
                        Update Case
                    </button>
                </div>

            </div>
        </div>
    </div>
</form>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
           
        </div>
    </div>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        function formatState(state) {

            // First option / placeholder
            if (!state.id || !state.element) {
                return state.text;
            }

            var image = $(state.element).data('image');

            // If no image exists, show only text
            if (!image){
                return state.text;
            }

            return $(`
                <div style="display:flex;align-items:center;gap:10px;">
                    <img src="${image}"
                        style="
                            width:35px;
                            height:35px;
                            border-radius:50%;
                            object-fit:cover;
                        ">

                    <span>${state.text}</span>
                </div>
            `);
        }

        $('.select2').select2({
            placeholder:'Select Arrest',
            templateResult: formatState,
            templateSelection: formatState
        });
    </script>

    <script>
        let suspectIndex = 1;
        let victimIndex = 1;

        // ==============================
        // UPDATE DROPDOWNS (NO DUPLICATES)
        // ==============================
        function updateDropdowns(type) {
            let selects = document.querySelectorAll(`select[name="${type}_ids[]"]`);
            let selectedValues = [];

            // Collect selected values
            selects.forEach(select => {
                if (select.value) {
                    selectedValues.push(select.value);
                }
            });

            // Disable duplicates
            selects.forEach(select => {
                let currentValue = select.value;

                Array.from(select.options).forEach(option => {
                    if (!option.value) return;

                    if (selectedValues.includes(option.value) && option.value !== currentValue) {
                        option.disabled = true;
                    } else {
                        option.disabled = false;
                    }
                });
            });
        }

        // ==============================
        // ADD SUSPECT
        // ==============================
        function addSuspect() {
            let container = document.getElementById("suspects-container");

            let row = `
            <div class="participant-row border p-3 mb-3 bg-light">
                <div class="row g-3">

                    <div class="col-md-8">
                        <select name="suspect_ids[]" class="form-select" required onchange="updateDropdowns('suspect')">
                            <option disabled selected>Select Suspect</option>
                            {% for p in persons %}
                                {% if p.role == "suspect" %}
                                <option value="{{ p.id }}">{{ p.first_name }} {{ p.last_name }}</option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <input type="radio" name="primary_suspect" value="${suspectIndex}">
                    </div>

                </div>
            </div>
            `;

            container.insertAdjacentHTML("beforeend", row);
            suspectIndex++;

            updateDropdowns('suspect');
        }

        // ==============================
        // ADD VICTIM
        // ==============================
        function addVictim() {
            let container = document.getElementById("victims-container");

            let row = `
            <div class="participant-row border p-3 mb-3 bg-light">
                <div class="row g-3">

                    <div class="col-md-8">
                        <select name="victim_ids[]" class="form-select" required onchange="updateDropdowns('victim')">
                            <option disabled selected>Select Victim</option>
                            {% for p in persons %}
                                {% if p.role == "victim" %}
                                <option value="{{ p.id }}">{{ p.first_name }} {{ p.last_name }}</option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <input type="radio" name="primary_victim" value="${victimIndex}">
                    </div>

                </div>
            </div>
            `;

            container.insertAdjacentHTML("beforeend", row);
            victimIndex++;

            updateDropdowns('victim');
        }

        // ==============================
        // INITIAL LOAD
        // ==============================
        document.addEventListener("DOMContentLoaded", function () {

            // Attach onchange to existing selects
            document.querySelectorAll('select[name="suspect_ids[]"]').forEach(el => {
                el.addEventListener("change", () => updateDropdowns('suspect'));
            });

            document.querySelectorAll('select[name="victim_ids[]"]').forEach(el => {
                el.addEventListener("change", () => updateDropdowns('victim'));
            });

            // Initial run
            updateDropdowns('suspect');
            updateDropdowns('victim');
        });
    </script>
{% endblock content %}
