{% extends 'base.html' %}
{% load static %}
{% block content %}
    <title>{% block title %}LDEA Officers Create New Drug Page{% endblock %}</title>
    <style>
        /* FORM CARD */
        .drug-form .card {
            border-radius: 8px;
            animation: fadeIn 0.25s ease-in-out;
        }

        /* LABEL */
        .form-label {
            font-weight: 500;
            margin-bottom: 6px;
            color: #333;
        }

        /* INPUT */
        .form-control {
            border-radius: 6px;
            border: 1px solid #ced4da;
            padding: 10px 12px;
            transition: all 0.2s ease;
        }

        /* INPUT FOCUS */
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.1rem rgba(13,110,253,0.15);
        }

        /* BUTTON */
        .btn-primary {
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        /* BUTTON HOVER */
        .btn-primary:hover {
            transform: translateY(-1px);
        }

        /* SUBTLE ENTRY ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .btn {
                width: 100%;
            }
        }
    </style>

    <div class="mt-4">
        <div class="row g-4">

            <div class="col-12 col-xl-12 order-1 order-xl-0">
                <div class="mb-9">
                    <div class="card shadow-none border my-4" data-component-card="data-component-card">
                        {% include 'includes/error.html' %}
                        
                        <div class="card-body p-0">
                            <div class="p-4 code-to-copy">
                                <div id="tableExample" data-list='{"valueNames":["name","email","age"],"page":5,"pagination":true}'>
                                    <form action="{% url 'crate_new_drug' %}" method="POST" enctype="multipart/form-data" class="drug-form">
                                        {% csrf_token %}

                                        <div class="card shadow-sm border-0">
                                            <div class="card-header bg-white border-bottom">
                                                <h5 class="mb-0 fw-semibold">Create New Drug</h5>
                                            </div>

                                            <div class="card-body">
                                                <div class="row g-4">

                                                    <!-- NAME -->
                                                    <div class="col-md-6">
                                                        <label class="form-label">Drug Name</label>
                                                        <input name="name" type="text" class="form-control" placeholder="Enter drug name" required>
                                                    </div>

                                                    <!-- CATEGORY -->
                                                    <div class="col-md-6">
                                                        <label class="form-label">Category</label>
                                                        <input name="category" type="text" class="form-control" placeholder="e.g. Narcotic, Stimulant" required>
                                                    </div>

                                                    <!-- UNITS -->
                                                    <div class="col-md-6">
                                                        <label class="form-label">Common Units</label>
                                                        <input name="common_units" type="text" class="form-control" placeholder="e.g. grams, pills" required>
                                                    </div>

                                                    <!-- Photo -->
                                                    <div class="col-md-4">
                                                        <label class="form-label">Photo</label>
                                                        <input name="photo" type="file" class="form-control">
                                                    </div>

                                                    <!-- DESCRIPTION -->
                                                    <div class="col-12">
                                                        <label class="form-label">Description</label>
                                                        <textarea name="description" class="form-control" rows="4" placeholder="Enter description" required></textarea>
                                                    </div>

                                                    <!-- BUTTON -->
                                                    <div class="col-12 d-flex justify-content-end">
                                                        <button type="submit" class="btn btn-primary px-4">
                                                            Save Drug
                                                        </button>
                                                    </div>

                                                </div>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
           
        </div>
    </div>

    <script>
        document.querySelector(".drug-form").addEventListener("submit", function() {
            const btn = this.querySelector("button");
            btn.disabled = true;
            btn.innerText = "Saving...";
        });
    </script>   
{% endblock content %}
