{% extends 'base.html' %}
{% load static %}
{% block content %}
    <title>{% block title %}Create MoG Users Page{% endblock %}</title>
    
    <div class="mt-4">
        <div class="row g-4">

            <div class="col-12 col-xl-12 order-1 order-xl-0">
                <div class="mb-9">
                    <div class="card shadow-none border my-4" data-component-card="data-component-card">
                        <div class="card-header p-4 border-bottom bg-body">
                            <div class="row g-3 justify-content-between align-items-center">
                                <div class="col-12 col-md">
                                    <h4 class="text-body mb-0">Ceate MoG Accounts User</h4>
                                    {% include 'includes/error.html' %}
                                </div>
                            </div>
                        </div>

                        <div class="card-body p-0">
                            <div class="p-4 code-to-copy">
                                <div id="tableExample" data-list='{"valueNames":["name","email","age"],"page":5,"pagination":true}'>
                                    <form method="POST" class="row g-3 mb-6" enctype="multipart/form-data">
                                        {% csrf_token %}
                                        <div>
                                            <div class="col-sm-6 col-md-3 text-center">

                                                </label>

                                                <!-- Hidden File Input -->
                                                <input type="file" name="profile_picture"  id="profile_picture"  accept="image/*" style="display: none;" onchange="previewFile(event)" required>
                                                <label class="form-label d-block fw-bold mb-3 mt-2">Profile Picture</label>
                                            </div>
                                            <script>
                                                function previewFile(event) {
                                                    const file = event.target.files[0];
                                                    if (!file) return;

                                                    const reader = new FileReader();
                                                    reader.onload = function(e) {
                                                        document.getElementById('previewImage').src = e.target.result;
                                                    };
                                                    reader.readAsDataURL(file);
                                                }
                                            </script>
                                        </div>

                                        <h4>Personal Info </h4>
                                        
                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="first_name" class="form-control" id="floatingInputGrid" type="text" placeholder="Project title" required/>
                                                <label for="floatingInputGrid">First Name</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="middle_name" class="form-control" id="floatingInputGrid" type="text" placeholder="Project title" required/>
                                                <label for="floatingInputGrid">Middle Name</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="last_name" class="form-control" id="floatingInputGrid" type="text" placeholder="Project title" required/>
                                                <label for="floatingInputGrid">Last Name</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <select name="gender" class="form-select" id="floatingSelectTask" required>
                                                    <option value="" selected disabled>Select Gender</option>
                                                    <option value="male">Male</option>
                                                    <option value="female">Female</option>
                                                    <option value="other">Other</option>
                                                </select>
                                                <label for="floatingSelectTask">Gender</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="flatpickr-input-container">
                                                <div class="form-floating">
                                                    <input name="date_of_birth" class="form-control datetimepicker" id="floatingInputStartDate" type="date" data-options='{"dateFormat":"Y-m-d"}' placeholder="end date" data-options='{"disableMobile":true}' required/>
                                                    <label class="ps-6" for="floatingInputStartDate">Date of Birth</label>
                                                    <span class="uil uil-calendar-alt flatpickr-icon text-body-tertiary"></span>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="phone" class="form-control" id="floatingInputGrid" type="number" placeholder="Project title" required/>
                                                <label for="floatingInputGrid">Phone Number</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="email" class="form-control" id="floatingInputGrid" type="email" placeholder="Project title" required/>
                                                <label for="floatingInputGrid">Email</label>
                                            </div>
                                        </div>  

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="emergency_contact_name" class="form-control" id="floatingInputGrid" type="text" placeholder="John Door" required/>
                                                <label for="floatingInputGrid">Emergency Contact preson</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="emergency_contact_phone" class="form-control" id="floatingInputGrid" type="number" placeholder="231 0000000" required/>
                                                <label for="floatingInputGrid">Emergency Contact Cell</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="blood_type" class="form-control" id="floatingInputGrid" type="text" placeholder="A+" required/>
                                                <label for="floatingInputGrid">blood type</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="identification_number" class="form-control" id="floatingInputGrid" type="number" placeholder="23132" required/>
                                                <label for="floatingInputGrid">identification number</label>
                                            </div>
                                        </div>                                                                            
                                        
                                        <div class="col-12 gy-6 col-md-6">
                                            <div class="form-floating">
                                                <textarea name="address" class="form-control" id="floatingProjectOverview" placeholder="Leave a comment here" style="height: 100px"required></textarea>
                                                <label for="floatingProjectOverview">Address</label>
                                            </div>
                                        </div>   
                                        
                                        <h4 class="mt-5 mb-0">Professional Info </h4>
                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <select name="role" class="form-select" id="floatingSelectTask"required>
                                                    <option value="" selected disabled>Select Position</option>
                                                    <option value="mog_head">MoG Head</option>
                                                    <option value="mog_officers">Officers</option>
                                                </select>
                                                <label for="floatingSelectTask">Positions</label>
                                            </div>
                                        </div>
                                        
                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="department" class="form-control" id="floatingInputGrid" type="text" placeholder="Head of OPs" required/>
                                                <label for="floatingInputGrid">department</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="rank" class="form-control" id="floatingInputGrid" type="text" placeholder="Head of OPs" required/>
                                                <label for="floatingInputGrid">rank</label>
                                            </div>
                                        </div>                                        

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="unit" class="form-control" id="floatingInputGrid" type="text" placeholder="Head of OPs" required/>
                                                <label for="floatingInputGrid">unit</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="badge_number" class="form-control" id="floatingInputGrid" type="text" placeholder="Head of OPs" required/>
                                                <label for="floatingInputGrid">badge_number</label>
                                            </div>
                                        </div>                                        

                                        <div class="col-sm-6 col-md-4">
                                            <div class="flatpickr-input-container">
                                                <div class="form-floating">
                                                    <input name="date_joined_agency" class="form-control datetimepicker" id="floatingInputStartDate" type="date" data-options='{"dateFormat":"Y-m-d"}' placeholder="end date" data-options='{"disableMobile":true}' required/>
                                                    <label class="ps-6" for="floatingInputStartDate">Date joined agency</label>
                                                    <span class="uil uil-calendar-alt flatpickr-icon text-body-tertiary"></span>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="service_number" class="form-control" id="floatingInputGrid" type="text" placeholder="Head of OPs" required/>
                                                <label for="floatingInputGrid">service number</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <select name="security_clearance_level" class="form-select" id="floatingSelectTask" required>
                                                    <option value="" selected disabled>Select Security Clearance Level</option>
                                                    <option value="confidential">Confidential</option>
                                                    <option value="secret">Secret</option>
                                                    <option value="top_secret">Top Secret</option>
                                                </select>
                                                <label for="floatingSelectTask">Security Clearance Level</label>
                                            </div>
                                        </div>

                                        <h4>Account Info </h4>
                                        
                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="user_name" class="form-control" id="floatingInputGrid" type="email" placeholder="Project title" required/>
                                                <label for="floatingInputGrid">User Name</label>
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-md-4">
                                            <div class="form-floating">
                                                <input name="password" class="form-control" id="floatingInputGrid" type="password" placeholder="Project title" required/>
                                                <label for="floatingInputGrid">Password</label>
                                            </div>
                                        </div>

                                        <div class="col-12 gy-6">
                                            <div class="row g-3">
                                                <div class="col-auto">
                                                    <button class="btn btn-primary">Create User</button>
                                                </div>
                                            </div>
                                        </div>

                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
           
        </div>
    </div>   
{% endblock content %}
