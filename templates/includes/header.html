{% load static %}
<nav class="navbar navbar-top fixed-top navbar-expand" id="navbarDefault" style="display:none;">
    <div class="collapse navbar-collapse justify-content-between">
        <div class="navbar-logo">
            <button class="btn navbar-toggler navbar-toggler-humburger-icon hover-bg-transparent" type="button" data-bs-toggle="collapse" data-bs-target="#navbarVerticalCollapse" aria-controls="navbarVerticalCollapse" aria-expanded="false" aria-label="Toggle Navigation"><span class="navbar-toggle-icon"><span class="toggle-line"></span></span></button>
            
            <a class="navbar-brand me-1 me-sm-3" href="{% url 'role_based_redirect' %}">
                <div class="d-flex align-items-center">
                    <img src="{% static 'assets/img/logo/logo1.png' %}" width="57" />
                    <h5 class="logo-text ms-2 d-none d-sm-block"></h5>
                </div>
            </a>
        </div>
       
        <ul class="navbar-nav navbar-nav-icons flex-row">
            <li class="nav-item dropdown">
                <a class="nav-link lh-1 pe-0" id="navbarDropdownUser" href="#!" role="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-haspopup="true" aria-expanded="false">
                    {% with request.user.get_profile_picture as pic %}
                    <div class="avatar avatar-l ">
                        <img class="rounded-circle " src="{% if pic %}{{ pic }}{% else %}{% static 'images/default-profile.png' %}{% endif %}" alt="{{request.user.get_full_name|default:request.user.username}}" />
                    </div>
                    {% endwith %}
                </a>

                <div class="dropdown-menu dropdown-menu-end navbar-dropdown-caret py-0 dropdown-profile shadow border" aria-labelledby="navbarDropdownUser">
                    <div class="card position-relative border-0">
                        <div class="card-body p-0">
                            <div class="text-center pt-4 pb-3">

                                {% with request.user.get_profile_picture as pic %}
                                <div class="avatar avatar-xl">
                                   <img  src="{% if pic %}{{ pic }}{% else %}{% static 'images/default-profile.png' %}{% endif %}" class="rounded-circle border shadow-sm" width="50" height="50" style="object-fit: cover;">
                                </div>
                                {% endwith %}                
                                <h6 class="mt-2 text-body-emphasis">
                                    {{request.user.get_full_name|default:request.user.username}}
                                </h6>
                            </div>
                        </div>
                        
                        <div class="card-footer p-0 border-top border-translucent">
                            <ul class="nav d-flex flex-column my-3">
                                <li class="nav-item">
                                    <a class="nav-link px-3 d-block" href="{% url 'profile' %}"> <span class="me-2 text-body align-bottom" data-feather="user-plus"></span>
                                        Edit My Account
                                    </a>
                                </li>
                            </ul>
                    
                            <hr />
                            <div class="px-3"> 
                                <a class="btn btn-phoenix-secondary d-flex flex-center w-100" href="{% url 'logout' %}"> 
                                    <span class="me-2" data-feather="log-out"> </span>
                                    Sign out
                                </a>
                            </div>
                            
                            <div class="my-2 text-center fw-bold fs-10 text-body-quaternary">
                                <a class="text-body-quaternary me-1" href="#!">Privacy policy</a>&bull;
                                <a class="text-body-quaternary mx-1" href="#!">Terms</a>&bull;
                                <a class="text-body-quaternary ms-1" href="#!">Cookies</a>
                            </div>
                        </div>
                    </div>
                </div>
            </li>
        </ul>
    </div>
</nav>
